name: "Daily Learning"

on:
  schedule:
    - cron: "0 14 * * *" # 10 AM EST = 14 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run daily learning script
        run: npx tsx scripts/daily-learning.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit, create PR, and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z $(git status -s articles/) ]]; then
            echo "No changes to commit"
            exit 0
          fi

          BRANCH_NAME="daily-thesis-$(date +'%Y%m%d%H%M%S')"
          git checkout -b $BRANCH_NAME

          git add articles/
          git commit -m "docs: auto-generate daily learning thesis [skip ci]"
          git push -u origin $BRANCH_NAME

          # Create PR
          gh pr create --title "docs: auto-generate daily learning thesis [skip ci]" \
                       --body "Automated daily learning thesis generation." \
                       --base main \
                       --head $BRANCH_NAME

          # Merge PR using squash (GitHub automatically signs squash merges)
          gh pr merge --squash --delete-branch
